    <meta property="og:description" content="Browse global cuisines, search ingredients, and easily build your custom weekly menu.">

    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="Discover Recipes - RecipeApp Workspace">

    <meta name="twitter:image" content="images/discover-recipes-banner.jpg">

    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🍲</text></svg>">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <nav class="navbar">
            <div class="logo">RecipeApp</div>
            <ul class="nav-links">
                <li><a href="index.html">Home</a></li>
                <li><a href="discover.html">Discover</a></li>
                <li><a href="planner.html">Planner</a></li>
                <li><a href="profile.html">Profile</a></li>
            </ul>
            <div>
                <button id="themeToggleBtn" class="btn btn-outline" style="margin-right: 10px;">🌓 Theme</button>
                <button id="logoutBtn" class="btn btn-outline">Logout</button>
            </div>
        </nav>
    </header>

    <main class="container">
        <section class="planner-header">
            <h2>Discover Recipes</h2>
            <p>Browse our sorted registry or run custom inquiries based on ingredient profiles.</p>
            
            <div style="display: flex; gap: 15px; margin-top: 20px; flex-wrap: wrap; justify-content: center;">
                <input type="text" id="searchInput" placeholder="Type keyword here... (e.g., Chicken, Cake)" style="max-width: 400px; flex: 2;">
                
                <select id="searchType" style="max-width: 200px; flex: 1;">
                    <option value="name">Search by Name</option>
                    <option value="ingredient">Search by Ingredient</option>
                </select>
                
                <button id="searchBtn" class="btn" style="padding: 10px 25px;">Search</button>
            </div>
        </section>

        <p id="discoverFeedback" class="feedback" style="text-align: center; font-size: 1.1rem; margin-top: 20px;"></p>

        <section id="discoverContainer" class="recipe-grid">
            </section>
    </main>

    <script src="app.js"></script>
