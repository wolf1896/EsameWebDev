<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Discover recipes by searching names or main ingredients.">
    <title>Discover Recipes - Recipe App</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🍲</text></svg>">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <nav class="navbar">
            <div class="logo">RecipeApp</div>
            <ul class="nav-links">
                <li><a href="index.html">Home</a></li>
                <li><a href="discover.html">Home</a></li>
                <li><a href="planner.html">Planner</a></li>
                <li><a href="profile.html">Profile</a></li>
            </ul>
            <div>
                <button id="themeToggleBtn" class="btn btn-outline" style="margin-right: 10px;">🌓 Theme</button>
                <button id="logoutBtn" class="btn btn-outline">Logout</button>
            </div>
        </nav>
    </header>

    <main class="container">
        <section class="planner-header">
            <h2>Discover New Recipes</h2>
            <p>Search the live culinary database by dish name or focus ingredient.</p>
            
            <div style="display: flex; gap: 15px; margin-top: 20px; flex-wrap: wrap; justify-content: center;">
                <input type="text" id="searchInput" placeholder="Type keyword here... (e.g., Chicken, Pasta, Arrabbiata)" style="max-width: 400px; flex: 2;">
                
                <select id="searchType" style="max-width: 200px; flex: 1;">
                    <option value="name">Search by Name</option>
                    <option value="ingredient">Search by Ingredient</option>
                </select>
                
                <button id="searchBtn" class="btn" style="padding: 10px 25px;">Search</button>
            </div>
        </section>

        <p id="discoverFeedback" class="feedback" style="text-align: center; font-size: 1.2rem; margin-top: 20px;"></p>

        <section id="discoverContainer" class="recipe-grid">
            </section>
    </main>

    <script src="app.js"></script>
</body>
</html>
