<!DOCTYPE html>
<html lang="en">
<head>
   <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">

    <title>RecipeApp Workspace - Discover & Plan Weekly Meals</title>
    <meta name="description" content="Discover delicious recipes, organize your weekly meal plan based on dietary preferences, and export beautifully paginated cooking sheets.">
    <meta name="keywords" content="meal planner, recipes, cookbook, culinary app, weekly dinner prep">
    <meta name="author" content="Mattia Lupo">

    <meta property="og:type" content="website">
    <meta property="og:url" content="https://git.wolf1896homelabserverforfuture.uk/wolf1896/EsameWebDev">
    <meta property="og:title" content="RecipeApp Workspace - Discover & Plan Weekly Meals">
    <meta property="og:description" content="Plan your meals seamlessly, filter by dietary requirements, and download custom printable PDFs.">
    <meta property="og:image" content="images/recipeapp-preview-banner.jpg"> 

    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="RecipeApp Workspace">
    <meta name="twitter:description" content="Dynamic meal planning and custom recipe compilation in a single clean frontend app.">
    <meta name="twitter:image" content="images/recipeapp-preview-banner.jpg">
    
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🍲</text></svg>">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <nav class="navbar">
            <div class="logo">RecipeApp</div>
            <ul class="nav-links">
                <li><a href="index.html">Home</a></li>
                <li><a href="discover.html">Discover</a></li>
                <li><a href="planner.html">Planner</a></li>
                <li><a href="profile.html">Profile</a></li>
            </ul>
            <div>
                <button id="themeToggleBtn" class="btn btn-outline" style="margin-right: 10px;">🌓 Theme</button>
                <button id="logoutBtn" class="btn btn-outline">Logout</button>
            </div>
        </nav>
    </header>

    <main class="container">
        <section class="planner-header" style="text-align: left; background: var(--card-bg); padding: 25px; border-radius: 8px; box-shadow: 0 4px 6px var(--card-shadow); margin-bottom: 30px;">
            <h2 id="welcomeGreeting" style="color: var(--primary-color);">Welcome back!</h2>
            <p style="margin-top: 5px;">Track your meal preparation workflows and culinary discoveries from one unified station.</p>
            
            <div style="display: flex; gap: 20px; margin-top: 20px; flex-wrap: wrap;">
                <div style="flex: 1; min-width: 150px; background: var(--bg-color); padding: 15px; border-radius: 6px; border-left: 4px solid var(--primary-color);">
                    <span style="font-size: 0.85rem; text-transform: uppercase; letter-spacing: 0.5px; color: #7f8c8d; display: block;">Meal Planner</span>
                    <strong id="statsPlannerCount" style="font-size: 1.6rem; display: block; margin-top: 5px;">0 Recipes</strong>
                </div>
                <div style="flex: 1; min-width: 150px; background: var(--bg-color); padding: 15px; border-radius: 6px; border-left: 4px solid #3498db;">
                    <span style="font-size: 0.85rem; text-transform: uppercase; letter-spacing: 0.5px; color: #7f8c8d; display: block;">Database Range</span>
                    <strong style="font-size: 1.6rem; display: block; margin-top: 5px;">Live Connected</strong>
                </div>
            </div>
        </section>

        <section>
            <h3 style="margin-bottom: 15px; font-size: 1.4rem; padding-left: 5px;">Chef's Special Recommendation</h3>
            <div id="featuredRecipeContainer">
                <p style="text-align: center; color: #7f8c8d;">Fetching today's choice selection...</p>
            </div>
        </section>
    </main>

    <script src="app.js"></script>
</body>
</html>
