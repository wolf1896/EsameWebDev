<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <title>Sign In - RecipeApp Workspace</title>
    <meta name="description" content="Log into your RecipeApp Workspace account to access your personal weekly meal dashboard.">
    
    <meta name="robots" content="index, follow">

    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🍲</text></svg>">
    <link rel="stylesheet" href="style.css">
</head>
<body class="center-layout">
    <main>
        <section class="card login-card">
            <h1>Welcome Back</h1>
            <p>Please log in to access your meal planner.</p>
            <form id="loginForm">
                <div class="form-group">
                    <label for="username">Username</label>
                    <input type="text" id="username" required minlength="3">
                </div>
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" required minlength="6">
                </div>
                <button type="submit" class="btn">Login</button>
                <p id="authFeedback" class="feedback"></p>
            </form>
        </section>
    </main>
    <script src="app.js"></script>
</body>
</html>
