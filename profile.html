<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Manage your Recipe App user profile and dietary preferences.">
    <title>User Profile - Recipe App</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🍲</text></svg>">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <nav class="navbar">
            <div class="logo">RecipeApp</div>
            <ul class="nav-links">
                <li><a href="index.html">Home</a></li>
                <li><a href="discover.html">Discover</a></li>
                <li><a href="planner.html">Planner</a></li>
                <li><a href="profile.html">Profile</a></li>
            </ul>
            <div>
                <button id="themeToggleBtn" class="btn btn-outline" style="margin-right: 10px;">🌓 Theme</button>
                <button id="logoutBtn" class="btn btn-outline">Logout</button>
            </div>
        </nav>
    </header>

    <main class="container">
        <div class="profile-layout">
            <section class="card profile-card">
                <h2>Your Profile</h2>
                <hr style="margin: 15px 0; border: 0; border-top: 1px solid #eee;">
                <p><strong>Username:</strong> <span id="displayUsername">Loading...</span></p>
                <p><strong>Email:</strong> <span id="displayEmail">Not set</span></p>
                <p><strong>Dietary Preference:</strong> <span id="displayDiet">None Specified</span></p>
            </section>

            <section class="card profile-form-card">
                <h3>Update Profile Details</h3>
                <form id="profileForm" novalidate>
                    <div class="form-group">
                        <label for="editEmail">Email Address</label>
                        <input type="email" id="editEmail" placeholder="Enter your email" required>
                    </div>
                    <div class="form-group">
                        <label for="editDiet">Dietary Preference</label>
                        <select id="editDiet" style="width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 4px;">
                            <option value="None Specified">No Restrictions</option>
                            <option value="Vegetarian">Vegetarian</option>
                            <option value="Vegan">Vegan</option>
                            <option value="Gluten-Free">Gluten-Free</option>
                        </select>
                    </div>
                    <button type="submit" class="btn">Save Changes</button>
                    <p id="profileFeedback" class="feedback"></p>
                </form>
            </section>
        </div>
    </main>

    <script src="app.js"></script>
</body>
</html>
